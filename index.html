<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width, initial-scale=1.0">
        <title>Il mio sito</title>
        <style>
            *{
                margin: 0;
                padding: 0;
            }
            body {
                font-family: ariel;
            }
            nav {
                background-color: #8c7a6b;
                color: #f5ede1;
                padding: 15px 30px;
                display: flex;
                gap: 20px;
            }
            nav a {
                color: #f5ede1;
                text-decoration: none;
            }
            .hero {
                background-color: #f0ebd5;
                color: #141414;
                text-align: center;
                padding:  100px 20px;
            }
            .hero h1 {
                font-size: 48px;
                color:#c9a84c;
                margin-bottom:  20px;
            }
            footer {
                background-color: #8c7a6b;
                color: #f5ede1;
                text-align: center;
                padding: 20px;
            }
            .chi-sono {
padding: 60px 20px;
text-align: center;
background-color: #f5ede1;
color: #3b2a22;
           }
           .chi-sono h2 {
            font-size: 32px;
            color: #c9a84c;
            margin-bottom: 20px;
           }
           .contatti {
            padding: 60px 20px;
            text-align: center;
            background-color: #3b2a22;
            color: #f5ede1;
           }
           .contatti h2 {
            font-size: 32px;
            color: #c9a84c;
            margin-bottom: 20px;
           }
           .contatti input, .contatti textarea {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
           }
           .contatti button {
            margin-top: 15px;
            padding: 10px 30px;
            background-color: #c9a84c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
           }
             nav a:hover { 
            color: #ffffff;
            background-color: #c9a84c;
            padding: 5px 10px;
            border-radius: 5px;
            transition: all 0.3s;
            }
            .contatti button:hover {
                background-color: #8c7a6b;
                transition: background-color 0.3s;
            }
            @media (max-widh: 600px) {
                nav {
                    flex-direction: column;
                    align-items: flex-start;
                    gap: 10px;
                    padding: 15px;
                }
                .hero {
                    padding: 60px 15px;
                }
                .hero h1 {
                    font-size: 32px;
                }
                .contatti input, .contatti textarea {
                    width: 90%;
                }
            }
        </style>
    </head>
    <body>
        <nav>
            <span>Il mio sito</span>
            <a href="#">Home</a>
            <a href="#">Chi sono</a>
            <a href="#">Contatti</a>
        </nav>
        <div class="hero">
            <h1>Ciao sono Amel!</h1>
            <p>Sono una sviluppatrice web in formazione</p>
        </div>
        <div class="chi-sono">
            <h2>Chi sono</h2>
            <p>Mi chiamo Amel, vengo da Mahdia in Tunisia.
                Sto imparando il web development con passione e impegno ogni giorno.</p>
            </p>
        </div>
        <div class="contatti">
            <h2>Contatti</h2>
            <p>Scrivimi un messaggio</p>
            <input id="nomeContatto" type="text" placeholder="Il tuo nome">
            <textarea id="messaggio" placeholder="Il tuo messaggio..."></textarea>
            <button onclick="inviaMessaggio()">Invia</button>
            <p id="risposta"></p>
        </div>

        <footer>
            <p>&copy; 2026 il mio sito</p>
        </footer>
        <script>
            function inviaMessaggio() {
                var nome = document.getElementById("nomeContatto").value;
                document.getElementById("risposta").innerHTML = 
                "grazie " + nome + "! ho ricevuto il tuo messaggio!";
            }
        </script>
    </body>
</html>
